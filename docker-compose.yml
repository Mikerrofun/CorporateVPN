services:
  db:
    image: postgres:16-alpine
    container_name: corpvpn_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: corpvpn_redis
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    container_name: corpvpn_backend
    restart: unless-stopped
    env_file: .env
    # Lets the backend reach Marzban via http://host.docker.internal:8002 when
    # Marzban runs as a separate compose stack on the same VPS. The backend
    # only talks to Marzban — it never touches Postgres (that's Prisma/web).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5).status==200 else 1)\""]
      interval: 30s
      timeout: 8s
      retries: 5
      start_period: 15s

  web:
    build: ./web
    container_name: corpvpn_web
    restart: unless-stopped
    env_file: .env
    environment:
      HOSTNAME: 0.0.0.0
      PORT: "3000"
      REDIS_URL: redis://redis:6379
    ports:
      - "127.0.0.1:6767:3000"
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      default:
      hosting_default:
        aliases:
          - corpvpn-web

volumes:
  pgdata:
  redisdata:

networks:
  hosting_default:
    external: true

# Uncomment and set to the real network name (see `docker network ls` on the
# VPS running Marzban) if you'd rather reach it by container name instead of
# host.docker.internal:8002.
# networks:
#   marzban-net:
#     external: true
#     name: marzban_default
